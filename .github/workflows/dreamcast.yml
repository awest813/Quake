name: Dreamcast Build

# Builds the Dreamcast target using the maintained KallistiOS SDK image
# (nold360/kallistios-sdk).  That image ships an old glibc, so GitHub's bundled
# Node.js (used by actions/checkout) cannot run *inside* it.  We therefore run
# the job on the host runner -- where checkout/node work -- and invoke the SDK
# image only for the compile via `docker run`, mounting the workspace at /src.

on:
  push:
    branches: [ "**" ]
    paths:
      - 'source/**'
      - 'Makefile.dreamcast'
      - 'scripts/dc/**'
      - '.github/workflows/dreamcast.yml'
  pull_request:
    paths:
      - 'source/**'
      - 'Makefile.dreamcast'
      - 'scripts/dc/**'
      - '.github/workflows/dreamcast.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Dreamcast target in KallistiOS container
        run: |
          docker run --rm -v "$PWD":/src -w /src \
            nold360/kallistios-sdk:latest \
            bash -c '
              set -e
              # Source KOS env defensively in case the image entrypoint did not.
              if [ -z "$KOS_BASE" ] && [ -f /opt/toolchains/dc/kos/environ.sh ]; then
                . /opt/toolchains/dc/kos/environ.sh
              fi
              echo "KOS_BASE=$KOS_BASE"
              command -v kos-cc
              # git describe powers the version string; tolerate ownership warnings.
              git config --global --add safe.directory /src || true
              make -f Makefile.dreamcast
              ls -l quake.elf
              # scramble/makeip ship with KOS; genisoimage/cdi4dc may not, so the
              # CDI step is informational rather than required.
              ./scripts/dc/make_cdi.sh quake.elf quake.cdi \
                || echo "CDI packaging tools not available in this image; skipping."
            '

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quake-dreamcast
          path: |
            quake.elf
            quake.cdi
          if-no-files-found: warn
