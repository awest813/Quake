name: Dreamcast Build

# Builds the Dreamcast target using the maintained KallistiOS SDK image
# (nold360/kallistios-sdk).  That image ships an old glibc, so GitHub's bundled
# Node.js (used by actions/checkout) cannot run *inside* it.  We therefore run
# the job on the host runner -- where checkout/node work -- and invoke the SDK
# image only for the compile via `docker run`, mounting the workspace at /src.

on:
  push:
    branches: [ "**" ]
    paths:
      - 'source/**'
      - 'Makefile.dreamcast'
      - 'scripts/dc/**'
      - '.github/workflows/dreamcast.yml'
  pull_request:
    paths:
      - 'source/**'
      - 'Makefile.dreamcast'
      - 'scripts/dc/**'
      - '.github/workflows/dreamcast.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe packaging tools in image
        run: |
          docker run --rm --entrypoint bash -v "$PWD":/src -w /src \
            nold360/kallistios-sdk:latest -c '
              [ -z "$KOS_BASE" ] && [ -f /opt/toolchains/dc/kos/environ.sh ] && . /opt/toolchains/dc/kos/environ.sh
              echo "=== tool availability ==="
              for t in mkdcdisc scramble makeip genisoimage mkisofs xorriso cdi4dc cdirip img4dc objcopy sh-elf-objcopy; do
                printf "%-16s %s\n" "$t" "$(command -v $t 2>/dev/null || echo MISSING)"
              done
              echo "=== KOS utils dir ==="
              ls -1 "$KOS_BASE/utils" 2>/dev/null || echo "no utils dir"
              echo "=== scramble dir ==="
              ls -1 "$KOS_BASE/utils/scramble" 2>/dev/null || echo MISSING
              echo "=== makeip dir ==="
              ls -1 "$KOS_BASE/utils/makeip" 2>/dev/null || echo MISSING
              echo "=== apt available? ==="
              command -v apt-get >/dev/null && echo "apt-get present" || echo "no apt-get"
            '

      - name: Build Dreamcast target in KallistiOS container
        run: |
          # NOTE: the image's default entrypoint is a wrapper that only runs a
          # bare command (e.g. `make`) and mangles `bash -c`, so we override it
          # with --entrypoint bash and source the KOS environment ourselves.
          docker run --rm --entrypoint bash -v "$PWD":/src -w /src \
            nold360/kallistios-sdk:latest -c '
              set -e
              if [ -z "$KOS_BASE" ] && [ -f /opt/toolchains/dc/kos/environ.sh ]; then
                . /opt/toolchains/dc/kos/environ.sh
              fi
              echo "KOS_BASE=$KOS_BASE"
              command -v kos-cc
              # git describe powers the version string; tolerate ownership warnings.
              git config --global --add safe.directory /src || true
              make -f Makefile.dreamcast
              test -f quake.elf
              ls -l quake.elf
              # scramble/makeip ship with KOS; genisoimage/cdi4dc may not, so the
              # CDI step is informational rather than required.
              ./scripts/dc/make_cdi.sh quake.elf quake.cdi \
                || echo "CDI packaging tools not available in this image; skipping."
            '

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quake-dreamcast
          path: |
            quake.elf
            quake.cdi
          if-no-files-found: warn
